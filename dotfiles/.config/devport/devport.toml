version = 2
port_range = { start = 19000, end = 19999 }
tmux_session = "devport"

[service."cloudflared"]
cwd = "~"
command = ["cloudflared", "tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
no_port = true
env_files = ["~/.env.secret"]
restart = "never"

[service."cloudflared".health]
type = "process"
startup_timeout = "10s"

[service."agent-tg-bridge"]
cwd = "~"
command = ["shell-helper", "agent", "tg-bridge"]
no_port = true
env_files = ["~/.env.secret"]
restart = "never"

[service."agent-tg-bridge".health]
type = "process"
startup_timeout = "5s"

[service."agentproxy"]
cwd = "~/github.com/hayeah/agentproxy"
command = ["agentproxy", "serve"]
port = 19000
port_env = "AGENTPROXY_PORT"
env_files = ["~/github.com/hayeah/agentproxy/.env"]
restart = "never"

[service."agentproxy".health]
type = "http"
url = "/healthz"
expect_status = [200]
startup_timeout = "10s"

[service."agentproxy".public]
hostname = "proxy.fork2.com"

[service."web/devport-dashboard"]
cwd = "~/github.com/hayeah/dotfiles/web"
command = ["pnpm", "--filter", "devport-dashboard", "dev"]
port = 19005
port_env = "VITE_PORT"
restart = "never"

[service."web/devport-dashboard".health]
type = "http"
url = "/"
expect_status = [200]
startup_timeout = "30s"

[service."web/devport-dashboard".public]
hostname = "devport.yohoward.com"
